<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counting Sort Visualizer</title>
    <link rel="stylesheet" href="/src/main.css">
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 2px; }
        .camera-layer { transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); will-change: transform; }
        .infinite-bg { background-image: radial-gradient(#334155 1px, transparent 1px); background-size: 30px 30px; }
        .cell { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .cell-active { transform: scale(1.1); border-color: #6366f1; box-shadow: 0 0 20px rgba(99, 102, 241, 0.4); }
        .cell-counting { background: rgba(16, 185, 129, 0.2); border-color: #10b981; }
        .cell-placing { background: rgba(244, 63, 94, 0.2); border-color: #f43f5e; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="./countingsort.jsx"></script>
</body>
</html>
