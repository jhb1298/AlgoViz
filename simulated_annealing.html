<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulated Annealing Visualizer (TSP)</title>
    <link rel="stylesheet" href="/src/main.css">
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 2px; }
        .path-line { transition: stroke 0.2s, stroke-width 0.2s; }
        .camera-layer { transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); will-change: transform; }
        .infinite-bg { background-image: radial-gradient(#334155 1px, transparent 1px); background-size: 30px 30px; }
        .node-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { r: 4; opacity: 0.5; } 50% { r: 8; opacity: 0.2; } 100% { r: 4; opacity: 0.5; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="./simulated_annealing.jsx"></script>
</body>
</html>
