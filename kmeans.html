<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Means Clustering Visualizer</title>
    <link rel="stylesheet" href="/src/main.css">
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 2px; }
        .centroid { transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.2)); }
        .data-point { transition: fill 0.5s, stroke 0.5s; }
        .assignment-line { transition: opacity 0.5s; stroke-dasharray: 5 5; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -10; } }
        .camera-layer { transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); will-change: transform; }
        .infinite-bg { background-image: radial-gradient(#334155 1px, transparent 1px); background-size: 30px 30px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="./kmeans.jsx"></script>
</body>
</html>
