<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topological Sort Visualizer</title>
    <link rel="stylesheet" href="/src/main.css">
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 2px; }
        .edge-active { stroke: #6366f1; stroke-width: 4; stroke-dasharray: 10 5; animation: dash-flow 0.5s linear infinite; }
        .edge-faded { stroke: #1e293b; opacity: 0.1; transition: opacity 1s; }
        @keyframes dash-flow { to { stroke-dashoffset: -15; } }
        .camera-layer { transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); will-change: transform; }
        .infinite-bg { background-image: radial-gradient(#334155 1px, transparent 1px); background-size: 30px 30px; }
        .node-active { border-color: #6366f1 !important; box-shadow: 0 0 25px rgba(99, 102, 241, 0.5); transform: scale(1.1); }
        .node-completed { opacity: 0.2; transform: scale(0.9); transition: all 1s; }
        .node-ready { border-color: #10b981 !important; box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="./topological.jsx"></script>
</body>
</html>
