<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVL Tree Visualizer</title>
    <meta name="description" content="Explore the mathematical beauty of AVL Tree Visualizer through interactive, cinematic visualizations.">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://mastersuite.netlify.app/avl.html">
    <meta property="og:title" content="AVL Tree Visualizer">
    <meta property="og:description" content="Explore the mathematical beauty of AVL Tree Visualizer through interactive, cinematic visualizations.">
    <meta property="og:image" content="https://mastersuite.netlify.app/og-image.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://mastersuite.netlify.app/avl.html">
    <meta property="twitter:title" content="AVL Tree Visualizer">
    <meta property="twitter:description" content="Explore the mathematical beauty of AVL Tree Visualizer through interactive, cinematic visualizations.">
    <meta property="twitter:image" content="https://mastersuite.netlify.app/og-image.png">
    <link rel="stylesheet" href="/src/main.css">
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 2px; }
        .camera-layer { transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); will-change: transform; }
        .infinite-bg { background-image: radial-gradient(#334155 1px, transparent 1px); background-size: 30px 30px; }
        .node-active { border-color: #6366f1 !important; box-shadow: 0 0 20px rgba(99, 102, 241, 0.5); transform: scale(1.1); }
        .node-imbalance { border-color: #f43f5e !important; box-shadow: 0 0 25px rgba(244, 63, 94, 0.6); animation: shake 0.5s infinite; }
        .node-found { border-color: #10b981 !important; box-shadow: 0 0 25px rgba(16, 185, 129, 0.6); }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-2px); } 75% { transform: translateX(2px); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="./avl.jsx"></script>
</body>
</html>
