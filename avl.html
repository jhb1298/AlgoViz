<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVL Tree Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="tree_script.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 2px; }
        .camera-layer { transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); will-change: transform; }
        .infinite-bg { background-image: radial-gradient(#334155 1px, transparent 1px); background-size: 30px 30px; }
        .node-active { border-color: #6366f1 !important; box-shadow: 0 0 20px rgba(99, 102, 241, 0.5); transform: scale(1.1); }
        .node-imbalance { border-color: #f43f5e !important; box-shadow: 0 0 25px rgba(244, 63, 94, 0.6); animation: shake 0.5s infinite; }
        .node-found { border-color: #10b981 !important; box-shadow: 0 0 25px rgba(16, 185, 129, 0.6); }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-2px); } 75% { transform: translateX(2px); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        const IconWrapper = ({ children, size = 20, className="", ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>{children}</svg>
        );
        const Play = (props) => <IconWrapper {...props}><polygon points="5 3 19 12 5 21 5 3"></polygon></IconWrapper>;
        const Pause = (props) => <IconWrapper {...props}><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></IconWrapper>;
        const SkipBack = (props) => <IconWrapper {...props}><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5"></line></IconWrapper>;
        const SkipForward = (props) => <IconWrapper {...props}><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></IconWrapper>;
        const Rewind = (props) => <IconWrapper {...props}><polygon points="11 19 2 12 11 5 11 19"></polygon><polygon points="22 19 13 12 22 5 22 19"></polygon></IconWrapper>;
        const FastForward = (props) => <IconWrapper {...props}><polygon points="13 19 22 12 13 5 13 19"></polygon><polygon points="2 19 11 12 2 5 2 19"></polygon></IconWrapper>;
        const GripHorizontal = (props) => <IconWrapper {...props}><circle cx="12" cy="9" r="1"></circle><circle cx="19" cy="9" r="1"></circle><circle cx="5" cy="9" r="1"></circle><circle cx="12" cy="15" r="1"></circle><circle cx="19" cy="15" r="1"></circle><circle cx="5" cy="15" r="1"></circle></IconWrapper>;
        const Home = (props) => <IconWrapper {...props}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></IconWrapper>;
        const Volume2 = (props) => <IconWrapper {...props}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></IconWrapper>;
        const VolumeX = (props) => <IconWrapper {...props}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></IconWrapper>;
        const ChevronUp = (props) => <IconWrapper {...props}><polyline points="18 15 12 9 6 15"></polyline></IconWrapper>;
        const ChevronDown = (props) => <IconWrapper {...props}><polyline points="6 9 12 15 18 9"></polyline></IconWrapper>;

        class Node {
            constructor(val) {
                this.val = val; this.left = null; this.right = null; this.height = 1;
                // Use stable ID based on value for React transitions
                this.id = `node-${val}`;
            }
        }

        const ROTATION_TYPES = {
            'LL': 'Left-Left (Single Right Rotation)',
            'RR': 'Right-Right (Single Left Rotation)',
            'LR': 'Left-Right (Double Rotation)',
            'RL': 'Right-Left (Double Rotation)'
        };

        function generateSimulation(initialArr, opType, opVal) {
            const history = [];
            let root = null;

            function record(status, desc, speech, activeId = null, rotationType = null) {
                const snapshot = serializeTree(root);
                history.push({ 
                    stepId: history.length, 
                    tree: snapshot, 
                    status, 
                    desc, 
                    speech, 
                    activeId,
                    rotationType 
                });
            }

            function getHeight(node) { return node ? node.height : 0; }
            function getBalance(node) { return node ? getHeight(node.left) - getHeight(node.right) : 0; }

            function rightRotate(y, silent = false) {
                let x = y.left; let T2 = x.right;
                x.right = y; y.left = T2;
                y.height = Math.max(getHeight(y.left), getHeight(y.right)) + 1;
                x.height = Math.max(getHeight(x.left), getHeight(x.right)) + 1;
                
                // Update closure root if needed
                if (y === root) root = x;

                if (!silent) record('ROTATE', `Right rotation on ${y.val}`, TREE_SCRIPT.AVL.ROTATE_RIGHT(y.val), y.id, 'LL');
                return x;
            }

            function leftRotate(x, silent = false) {
                let y = x.right; let T2 = y.left;
                y.left = x; x.right = T2;
                x.height = Math.max(getHeight(x.left), getHeight(x.right)) + 1;
                y.height = Math.max(getHeight(y.left), getHeight(y.right)) + 1;
                
                // Update closure root if needed
                if (x === root) root = y;

                if (!silent) record('ROTATE', `Left rotation on ${x.val}`, TREE_SCRIPT.AVL.ROTATE_LEFT(x.val), x.id, 'RR');
                return y;
            }

            function rebalance(node, silent = false) {
                if (!node) return null;
                node.height = 1 + Math.max(getHeight(node.left), getHeight(node.right));
                let balance = getBalance(node);

                if (!silent && Math.abs(balance) > 1) {
                    record('IMBALANCE', `Imbalance at ${node.val} (Factor: ${balance})`, TREE_SCRIPT.AVL.IMBALANCE(node.val), node.id);
                }

                // LL Case
                if (balance > 1 && getBalance(node.left) >= 0) {
                    return rightRotate(node, silent);
                }
                // LR Case
                if (balance > 1 && getBalance(node.left) < 0) {
                    if (!silent) record('ROTATE', `Double Rotation: Left-Right Part 1`, `Rotating left child ${node.left.val} left.`, node.left.id, 'LR');
                    node.left = leftRotate(node.left, silent);
                    if (!silent) record('ROTATE', `Double Rotation: Left-Right Part 2`, `Now rotating ${node.val} right.`, node.id, 'LR');
                    return rightRotate(node, silent);
                }
                // RR Case
                if (balance < -1 && getBalance(node.right) <= 0) {
                    return leftRotate(node, silent);
                }
                // RL Case
                if (balance < -1 && getBalance(node.right) > 0) {
                    if (!silent) record('ROTATE', `Double Rotation: Right-Left Part 1`, `Rotating right child ${node.right.val} right.`, node.right.id, 'RL');
                    node.right = rightRotate(node.right, silent);
                    if (!silent) record('ROTATE', `Double Rotation: Right-Left Part 2`, `Now rotating ${node.val} left.`, node.id, 'RL');
                    return leftRotate(node, silent);
                }
                return node;
            }

            function insert(node, val, silent = false) {
                if (!node) return new Node(val);
                if (!silent) record('COMPARING', `Comparing ${val} with ${node.val}`, TREE_SCRIPT.BST.COMPARING(val, node.val), node.id);
                
                if (val < node.val) node.left = insert(node.left, val, silent);
                else if (val > node.val) node.right = insert(node.right, val, silent);
                else return node;

                return rebalance(node, silent);
            }

            function search(node, val) {
                if (!node) { record('NOT_FOUND', `${val} not found`, TREE_SCRIPT.AVL.NOT_FOUND(val)); return null; }
                record('COMPARING', `Comparing ${val} with ${node.val}`, TREE_SCRIPT.AVL.SEARCH(val, node.val), node.id);
                if (val === node.val) { record('FOUND', `Found ${val}!`, TREE_SCRIPT.AVL.FOUND(val), node.id); return node; }
                if (val < node.val) return search(node.left, val);
                return search(node.right, val);
            }

            function findMin(node) {
                while (node.left) node = node.left;
                return node;
            }

            function remove(node, val, silent = false) {
                if (!node) return null;
                if (!silent) record('COMPARING', `Comparing ${val} with ${node.val}`, TREE_SCRIPT.BST.COMPARING(val, node.val), node.id);
                
                if (val < node.val) node.left = remove(node.left, val, silent);
                else if (val > node.val) node.right = remove(node.right, val, silent);
                else {
                    if (!silent) record('DELETE', `Deleting node ${val}`, TREE_SCRIPT.AVL.DELETE(val), node.id);
                    if (!node.left) return node.right;
                    if (!node.right) return node.left;
                    
                    let temp = findMin(node.right);
                    node.val = temp.val;
                    // Stable ID update: if we swap values, we should swap IDs too or use stable ones
                    node.id = `node-${temp.val}`; 
                    node.right = remove(node.right, temp.val, silent);
                }
                return rebalance(node, silent);
            }

            function serializeTree(node) {
                if (!node) return null;
                const bf = getBalance(node);
                return { 
                    val: node.val, 
                    id: node.id, 
                    height: node.height,
                    balance: bf,
                    left: serializeTree(node.left), 
                    right: serializeTree(node.right) 
                };
            }

            // Initialization
            initialArr.forEach(v => { root = insert(root, v, true); });
            history.length = 0;
            record('START', "Initial Tree Ready", TREE_SCRIPT.AVL.START());

            if (opType === 'INSERT') {
                record('COMPARING', `Inserting ${opVal}`, TREE_SCRIPT.AVL.INSERT(opVal));
                root = insert(root, opVal);
                record('SUCCESS', "Tree Balanced!", TREE_SCRIPT.AVL.BALANCED());
            } else if (opType === 'SEARCH') {
                search(root, opVal);
            } else if (opType === 'DELETE') {
                root = remove(root, opVal);
                record('SUCCESS', "Tree Re-balanced!", TREE_SCRIPT.AVL.BALANCED());
            }

            return history;
        }

        const NodeComponent = ({ node, x, y, isActive, isImbalanced, isFound }) => (
            <div className={`absolute w-14 h-14 rounded-full bg-slate-800 border-4 flex flex-col items-center justify-center font-black text-lg transition-all duration-500 z-20 ${isActive ? 'node-active' : (isFound ? 'node-found' : (isImbalanced ? 'node-imbalance' : 'border-slate-700'))}`} style={{ left: x - 28, top: y - 28 }}>
                {node.val}
                <div className={`absolute -top-8 px-1.5 py-0.5 rounded text-[9px] font-bold ${Math.abs(node.balance) > 1 ? 'bg-rose-500 text-white' : 'bg-slate-700 text-slate-300'}`}>
                    BF: {node.balance}
                </div>
                <div className="absolute -bottom-8 px-1.5 py-0.5 rounded text-[9px] font-bold bg-slate-700 text-slate-300">
                    H: {node.height}
                </div>
            </div>
        );

        const BalanceTable = ({ tree }) => {
            const nodes = [];
            const traverse = (node) => {
                if (!node) return;
                nodes.push(node);
                traverse(node.left);
                traverse(node.right);
            };
            traverse(tree);
            nodes.sort((a, b) => a.val - b.val);

            return (
                <div className="bg-slate-800/50 rounded-xl overflow-hidden border border-slate-700">
                    <table className="w-full text-left text-xs">
                        <thead>
                            <tr className="bg-slate-900/80 text-slate-400 uppercase tracking-wider font-bold">
                                <th className="px-3 py-2">Node</th>
                                <th className="px-3 py-2 text-center">Height</th>
                                <th className="px-3 py-2 text-right">Balance</th>
                            </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-700/50">
                            {nodes.map((node, i) => (
                                <tr key={node.id} className="hover:bg-slate-700/30 transition-colors">
                                    <td className="px-3 py-2 font-bold text-blue-400">{node.val}</td>
                                    <td className="px-3 py-2 text-center text-slate-400">{node.height}</td>
                                    <td className={`px-3 py-2 text-right font-mono ${Math.abs(node.balance) > 1 ? 'text-rose-400 font-bold' : 'text-emerald-400'}`}>
                                        {node.balance > 0 ? `+${node.balance}` : node.balance}
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        };

        const App = () => {
            const [treeData, setTreeData] = useState([30, 20, 10, 40, 50]);
            const [opType, setOpType] = useState('INSERT');
            const [opVal, setOpVal] = useState(25);
            const [currentStep, setCurrentStep] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [speedMultiplier, setSpeedMultiplier] = useState(1);
            const [zoom, setZoom] = useState(0.8);
            const [isMuted, setIsMuted] = useState(false);
            const [isMinimized, setIsMinimized] = useState(false);
            const [showSidebar, setShowSidebar] = useState(true);
            
            const [manualOffset, setManualOffset] = useState({ x: 0, y: 0 });
            const [panelOffset, setPanelOffset] = useState({ x: 0, y: 0 });
            const [isDraggingCanvas, setIsDraggingCanvas] = useState(false);
            const [isDraggingPanel, setIsDraggingPanel] = useState(false);
            const canvasDragStart = useRef({ x: 0, y: 0 });
            const panelDragStart = useRef({ x: 0, y: 0 });
            const isPlayingRef = useRef(false);
            isPlayingRef.current = isPlaying;

            const history = useMemo(() => generateSimulation(treeData, opType, opVal), [treeData, opType, opVal]);

            const nextStep = () => { setCurrentStep(prev => (prev < history.length - 1 ? prev + 1 : (setIsPlaying(false), prev))); };
            const prevStep = () => { setCurrentStep(prev => Math.max(0, prev - 1)); setIsPlaying(false); };

            const speak = (text) => {
                const delay = (1200 / speedMultiplier);
                if (isMuted || !text) { setTimeout(() => { if(isPlayingRef.current) nextStep(); }, delay); return; }
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.pitch = 1.1; utterance.rate = 1.1 * speedMultiplier;
                utterance.onend = () => { if(isPlayingRef.current) nextStep(); };
                window.speechSynthesis.speak(utterance);
            };

            useEffect(() => {
                if (isPlaying) speak(history[currentStep]?.speech);
                else window.speechSynthesis.cancel();
            }, [isPlaying, currentStep]);

            const state = history[currentStep] || { tree: null };

            const renderLines = (node, x, y, level) => {
                if (!node) return null;
                const spread = 700 / Math.pow(2, level);
                return (
                    <React.Fragment key={`line-${node.id}`}>
                        {node.left && <line x1={x} y1={y} x2={x - spread} y2={y + 100} stroke="#1e293b" strokeWidth="2" />}
                        {node.right && <line x1={x} y1={y} x2={x + spread} y2={y + 100} stroke="#1e293b" strokeWidth="2" />}
                        {renderLines(node.left, x - spread, y + 100, level + 1)}
                        {renderLines(node.right, x + spread, y + 100, level + 1)}
                    </React.Fragment>
                );
            };

            const renderNodes = (node, x, y, level) => {
                if (!node) return null;
                const spread = 700 / Math.pow(2, level);
                return (
                    <React.Fragment key={node.id}>
                        <NodeComponent node={node} x={x} y={y} isActive={state.activeId === node.id} isImbalanced={state.status === 'IMBALANCE' && state.activeId === node.id} isFound={state.status === 'FOUND' && state.activeId === node.id} />
                        {renderNodes(node.left, x - spread, y + 100, level + 1)}
                        {renderNodes(node.right, x + spread, y + 100, level + 1)}
                    </React.Fragment>
                );
            };

            const commitOperation = () => {
                if (opType === 'INSERT') {
                    if (!treeData.includes(opVal)) setTreeData([...treeData, opVal]);
                } else if (opType === 'DELETE') {
                    setTreeData(treeData.filter(v => v !== opVal));
                }
                setCurrentStep(0);
                setIsPlaying(true);
            };

            return (
                <div className="h-screen w-screen flex flex-col relative overflow-hidden bg-slate-900 text-white select-none" onMouseMove={(e) => { if(isDraggingPanel) setPanelOffset({x: e.clientX-panelDragStart.current.x, y: e.clientY-panelDragStart.current.y}); else if(isDraggingCanvas) setManualOffset({x: e.clientX-canvasDragStart.current.x, y: e.clientY-canvasDragStart.current.y}); }} onMouseUp={() => {setIsDraggingCanvas(false); setIsDraggingPanel(false);}}>
                    <div className="absolute top-0 left-0 right-0 z-[60] top-nav-area">
                        <div className="absolute top-0 left-0 w-full h-4 z-[70] peer"></div>
                        <div className="relative h-16 bg-slate-900/80 backdrop-blur-md border-b border-slate-700/50 flex items-center justify-between px-6 shadow-2xl transition-transform duration-300 -translate-y-full peer-hover:translate-y-0 hover:translate-y-0 z-[60]">
                            <div className="flex items-center gap-4"><a href="index.html" className="bg-slate-800 p-2 rounded-lg hover:bg-slate-700 transition-colors text-slate-400 hover:text-white"><Home size={20} /></a><div><h1 className="font-bold text-lg leading-none tracking-tight">AVL Tree Visualizer</h1><span className="text-xs text-slate-400 font-mono">Self-Balancing with Rotations</span></div></div>
                            <div className="flex items-center gap-3">
                                <div className="flex bg-slate-800 p-1 rounded-lg border border-slate-700">
                                    <button onClick={() => setOpType('INSERT')} className={`px-3 py-1 rounded-md text-xs font-bold transition-all ${opType === 'INSERT' ? 'bg-blue-600 text-white' : 'text-slate-400'}`}>Insert</button>
                                    <button onClick={() => setOpType('SEARCH')} className={`px-3 py-1 rounded-md text-xs font-bold transition-all ${opType === 'SEARCH' ? 'bg-emerald-600 text-white' : 'text-slate-400'}`}>Search</button>
                                    <button onClick={() => setOpType('DELETE')} className={`px-3 py-1 rounded-md text-xs font-bold transition-all ${opType === 'DELETE' ? 'bg-rose-600 text-white' : 'text-slate-400'}`}>Delete</button>
                                </div>
                                <input type="number" value={opVal} onChange={e => setOpVal(Number(e.target.value))} className="w-16 bg-slate-800 border border-slate-700 rounded-lg px-2 py-1.5 font-bold text-blue-400 outline-none focus:border-blue-500" />
                                <button onClick={commitOperation} className="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg font-bold transition-all shadow-lg shadow-blue-900/20">Execute</button>
                                <button onClick={() => setShowSidebar(!showSidebar)} className={`flex items-center gap-2 px-4 py-2 rounded-lg font-bold transition-all ${showSidebar ? 'bg-slate-700 text-white' : 'bg-slate-800 text-slate-400 hover:text-white'}`}>{showSidebar ? "Hide Stats" : "Show Stats"}</button>
                            </div>
                        </div>
                    </div>

                    <div className="flex flex-1 overflow-hidden relative">
                        <div className="flex-1 relative infinite-bg overflow-hidden cursor-grab" onWheel={(e) => setZoom(z => Math.min(Math.max(0.2, z-e.deltaY*0.001), 1.5))} onMouseDown={(e) => {if(!e.target.closest('.control-panel-wrapper') && !e.target.closest('.top-nav-area')) {setIsDraggingCanvas(true); canvasDragStart.current={x: e.clientX-manualOffset.x, y: e.clientY-manualOffset.y};}}}>
                            <div className={`absolute left-0 top-0 w-full h-full ${isDraggingCanvas ? '' : 'camera-layer'}`} style={{ transform: `translate(${manualOffset.x + 0}px, ${manualOffset.y + 0}px) scale(${zoom})` }}>
                                <svg className="absolute top-0 left-0 w-full h-full overflow-visible">
                                    {state.tree && renderLines(state.tree, 500, 100, 1)}
                                </svg>
                                {state.tree && renderNodes(state.tree, 500, 100, 1)}
                            </div>
                        </div>

                        {showSidebar && (
                            <div className="w-80 bg-slate-900/50 backdrop-blur-xl border-l border-slate-700/50 flex flex-col p-6 overflow-y-auto gap-6 z-40 relative">
                                <div>
                                    <h3 className="text-xs font-black uppercase tracking-[0.2em] text-blue-400 mb-4 flex items-center gap-2">
                                        <div className="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div> Node Stats
                                    </h3>
                                    <BalanceTable tree={state.tree} />
                                </div>
                                {state.rotationType && (
                                    <div className="p-4 bg-rose-500/10 border border-rose-500/30 rounded-xl animate-bounce">
                                        <h4 className="text-[10px] font-black uppercase text-rose-400 mb-1">Active Rotation</h4>
                                        <p className="text-sm font-bold text-white">{ROTATION_TYPES[state.rotationType]}</p>
                                    </div>
                                )}
                                <div className="p-4 bg-slate-800/50 rounded-xl border border-slate-700">
                                    <h4 className="text-[10px] font-black uppercase text-slate-500 mb-2">AVL Rules</h4>
                                    <ul className="text-[11px] text-slate-400 space-y-2 list-disc pl-4">
                                        <li>Every node has a balance factor (BF) of -1, 0, or 1.</li>
                                        <li><span className="text-rose-400 font-bold">BF = Height(Left) - Height(Right)</span></li>
                                        <li>If |BF| &gt; 1, rotations are performed to restore balance.</li>
                                    </ul>
                                </div>
                            </div>
                        )}
                    </div>

                    <div className="absolute bottom-6 left-1/2 w-full max-w-4xl px-4 z-50 control-panel-wrapper" style={{ transform: `translate(calc(-50% + ${panelOffset.x}px), ${panelOffset.y}px)` }}>
                        <div className={`bg-slate-900/40 hover:bg-slate-900/85 backdrop-blur-md border border-slate-600/30 rounded-2xl shadow-2xl flex flex-col relative box-border transition-all duration-300 ${isMinimized ? 'w-fit min-w-[180px] mx-auto px-4 pb-3 pt-1' : 'px-5 pb-4 pt-2'}`}>
                            <div className="w-full h-6 cursor-grab active:cursor-grabbing flex justify-center items-center mb-1" onMouseDown={(e) => {e.preventDefault(); setIsDraggingPanel(true); panelDragStart.current={x:e.clientX-panelOffset.x, y:e.clientY-panelOffset.y}; e.stopPropagation();}}>
                                <div className="bg-white/10 rounded-full px-6 py-0.5"><GripHorizontal size={12} className="text-white/50" /></div>
                            </div>
                            <button onClick={() => setIsMinimized(!isMinimized)} className="absolute top-2 right-2 p-1 hover:bg-slate-700/50 rounded-md text-slate-400 hover:text-white transition-colors z-50">{isMinimized ? <ChevronUp size={16}/> : <ChevronDown size={18}/>}</button>
                            {isMinimized ? (
                                <div className="flex items-center justify-center gap-4">
                                    <button onClick={prevStep} className="p-1.5 hover:bg-slate-700/50 rounded-md text-slate-200"><Rewind size={18}/></button>
                                    <button onClick={() => setIsPlaying(!isPlaying)} className={`w-10 h-10 flex items-center justify-center rounded-full shadow-lg transform transition-all active:scale-95 border border-white/20 ${isPlaying ? 'bg-amber-500' : 'bg-blue-600'}`}>{isPlaying ? <Pause fill="white" size={18} /> : <Play fill="white" size={18} className="ml-1"/>}</button>
                                    <button onClick={nextStep} className="p-1.5 hover:bg-slate-700/50 rounded-md text-slate-200"><FastForward size={18}/></button>
                                </div>
                            ) : (
                                <>
                                    <div className="relative w-full h-1.5 bg-slate-800/80 rounded-full mb-3 mt-1"><div className="absolute top-0 left-0 h-full bg-blue-500 rounded-full transition-all duration-100" style={{ width: `${(currentStep / (history.length-1)) * 100}%` }}></div><input type="range" min="0" max={history.length - 1} value={currentStep} onChange={(e) => { setIsPlaying(false); setCurrentStep(Number(e.target.value)); }} className="absolute -top-2 left-0 w-full h-6 opacity-0 cursor-pointer z-10" /></div>
                                    <div className="flex items-center justify-between w-full">
                                        <div className="flex flex-col w-[30%] overflow-hidden pr-2"><span className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-0.5">Step {String(currentStep).padStart(3, '0')}</span><span className="text-sm font-mono text-emerald-300 truncate">{state?.desc}</span></div>
                                        <div className="flex items-center justify-center gap-3 w-[40%]"><button onClick={() => setCurrentStep(0)} className="p-1.5 hover:bg-slate-700/50 rounded-md text-slate-300 transition-colors"><SkipBack size={16}/></button><button onClick={prevStep} className="p-1.5 hover:bg-slate-700/50 rounded-md text-slate-200 transition-colors"><Rewind size={18}/></button><button onClick={() => setIsPlaying(!isPlaying)} className={`w-12 h-12 flex items-center justify-center rounded-full shadow-lg transform transition-all active:scale-95 border border-white/20 ${isPlaying ? 'bg-amber-500' : 'bg-blue-600'}`}>{isPlaying ? <Pause fill="white" size={20} /> : <Play fill="white" size={20} className="ml-1"/>}</button><button onClick={nextStep} className="p-1.5 hover:bg-slate-700/50 rounded-md text-slate-200 transition-colors"><FastForward size={18}/></button><button onClick={() => setCurrentStep(history.length - 1)} className="p-1.5 hover:bg-slate-700/50 rounded-md text-slate-300 transition-colors"><SkipForward size={16}/></button></div>
                                        <div className="flex items-center justify-end gap-4 w-[30%]"><button onClick={() => setIsMuted(!isMuted)} className={`p-2 rounded-lg transition-colors ${isMuted ? 'text-rose-400 bg-rose-400/10' : 'text-blue-400 bg-blue-400/10'}`}>{isMuted ? <VolumeX size={18}/> : <Volume2 size={18}/>}</button>
                                        <div className="flex flex-col gap-1 items-end w-24">
                                            <span className="text-[9px] font-bold uppercase text-slate-400 tracking-wider">Speed {speedMultiplier}x</span>
                                            <input type="range" min="0.5" max="2.0" step="0.1" value={speedMultiplier} onChange={(e) => setSpeedMultiplier(Number(e.target.value))} className="w-full h-1 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-400" />
                                        </div></div>
                                    </div>
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
