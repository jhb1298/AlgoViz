        body { margin: 0; overflow: hidden; background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }

        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 2px; }
        .neuron { transition: all 0.5s; border: 2px solid #475569; }
        .neuron-active { transform: scale(1.1); border-color: #818cf8; box-shadow: 0 0 25px rgba(129, 140, 248, 0.8); }
        .weight-line { transition: stroke-width 0.5s, stroke 0.5s; stroke-linecap: round; }
        .signal-particle { offset-path: path(attr(d)); animation: flow 1s linear infinite; }
        @keyframes flow { 0% { offset-distance: 0%; opacity: 0; } 50% { opacity: 1; } 100% { offset-distance: 100%; opacity: 0; } }
        .camera-layer { transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); will-change: transform; }
        .infinite-bg { background-image: radial-gradient(#475569 1px, transparent 1px); background-size: 30px 30px; }
