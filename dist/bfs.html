        body { margin: 0; overflow: hidden; background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }

        .node-active { border-color: #6366f1 !important; box-shadow: 0 0 25px rgba(99, 102, 241, 0.5); transform: scale(1.1); }
        .node-queued { border-color: #3b82f6 !important; border-style: dashed; }
