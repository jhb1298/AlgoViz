    <title>Minimax & Alpha-Beta Pruning</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 2px; }
        @keyframes pulse-return { 0% { stroke-width: 2; stroke: #10b981; opacity: 1; } 100% { stroke-width: 12; stroke: #10b981; opacity: 0; } }
        @keyframes dash-flow { to { stroke-dashoffset: -20; } }
        .edge-waiting { stroke-dasharray: 10 10; animation: dash-flow 0.5s linear infinite; }
        .edge-return { animation: pulse-return 0.8s ease-out forwards; }
        .edge-path { transition: stroke 0.3s, stroke-width 0.3s, opacity 0.5s; }
        .camera-layer { transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); will-change: transform; }
        .infinite-bg { background-image: radial-gradient(#334155 1px, transparent 1px); background-size: 30px 30px; }
        .code-highlight { background-color: rgba(234, 179, 8, 0.15); border-left: 3px solid #eab308; }
        .code-highlight-waiting { border-left: 3px solid #6366f1; animation: code-pulse 2s infinite; }
        @keyframes code-pulse { 0% { background-color: rgba(99, 102, 241, 0.15); } 50% { background-color: rgba(99, 102, 241, 0.4); } 100% { background-color: rgba(99, 102, 241, 0.15); } }
        .pruned-ghost { opacity: 0.15 !important; filter: grayscale(1); pointer-events: none; }
