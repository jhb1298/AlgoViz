    <link rel="stylesheet" href="/src/main.css">
    <style>
        body { margin: 0; overflow: hidden; background-color: #030712; color: white; font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 2px; }
        .camera-layer { transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); will-change: transform; }
        .infinite-bg { background-image: radial-gradient(#1e293b 1px, transparent 1px); background-size: 40px 40px; }
        .region { transition: fill 0.5s, stroke 0.3s; stroke-width: 2; stroke: #1e293b; }
        .region-active { stroke: #fff !important; stroke-width: 4; filter: drop-shadow(0 0 15px rgba(255,255,255,0.3)); }
        .region-conflict { stroke: #f43f5e !important; stroke-width: 5; animation: pulse 0.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="./map_coloring.jsx"></script>
