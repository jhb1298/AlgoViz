<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genetic Algorithm Visualizer</title>
    <meta name="description" content="Explore the mathematical beauty of Genetic Algorithm Visualizer through interactive, cinematic visualizations.">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://mastersuite.netlify.app/genetic.html">
    <meta property="og:title" content="Genetic Algorithm Visualizer">
    <meta property="og:description" content="Explore the mathematical beauty of Genetic Algorithm Visualizer through interactive, cinematic visualizations.">
    <meta property="og:image" content="https://mastersuite.netlify.app/og-image.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://mastersuite.netlify.app/genetic.html">
    <meta property="twitter:title" content="Genetic Algorithm Visualizer">
    <meta property="twitter:description" content="Explore the mathematical beauty of Genetic Algorithm Visualizer through interactive, cinematic visualizations.">
    <meta property="twitter:image" content="https://mastersuite.netlify.app/og-image.png">
    <link rel="stylesheet" href="/src/main.css">
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 2px; }
        .dna-char { transition: all 0.3s; }
        .dna-correct { color: #10b981; font-weight: bold; text-shadow: 0 0 8px rgba(16, 185, 129, 0.5); }
        .dna-wrong { color: #64748b; }
        .pop-card { transition: transform 0.3s, border-color 0.3s; }
        .pop-card-best { border-color: #f59e0b !important; background-color: rgba(245, 158, 11, 0.1); transform: scale(1.05); z-index: 10; }
        .camera-layer { transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); will-change: transform; }
        .infinite-bg { background-image: radial-gradient(#334155 1px, transparent 1px); background-size: 30px 30px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="./genetic.jsx"></script>
</body>
</html>
