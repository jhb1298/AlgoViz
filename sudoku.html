<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Solver Visualizer (Backtracking)</title>
    <link rel="stylesheet" href="/src/main.css">
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 2px; }
        .sudoku-cell { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid #1e293b; }
        .sudoku-cell-active { background-color: rgba(99, 102, 241, 0.4); transform: scale(1.05); z-index: 10; border-color: #6366f1 !important; }
        .sudoku-cell-conflict { background-color: rgba(244, 63, 94, 0.3); color: #fb7185; }
        .sudoku-cell-safe { background-color: rgba(16, 185, 129, 0.2); color: #34d399; }
        .sudoku-cell-fixed { background-color: #1e293b; font-weight: 900; color: #94a3b8; }
        .sudoku-grid { border: 4px solid #334155; }
        .subgrid-border-r { border-right: 3px solid #475569; }
        .subgrid-border-b { border-bottom: 3px solid #475569; }
        .camera-layer { transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); will-change: transform; }
        .infinite-bg { background-image: radial-gradient(#334155 1px, transparent 1px); background-size: 30px 30px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="./sudoku.jsx"></script>
</body>
</html>
