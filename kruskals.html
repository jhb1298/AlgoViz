<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kruskal's Algorithm Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="mst_script.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 2px; }
        .edge-active { stroke: #6366f1; stroke-width: 4; stroke-dasharray: 10 5; animation: dash-flow 0.5s linear infinite; }
        .edge-mst { stroke: #10b981; stroke-width: 6; filter: drop-shadow(0 0 10px rgba(16, 185, 129, 0.6)); transition: all 0.5s; }
        .edge-rejected { stroke: #ef4444; stroke-width: 2; stroke-dasharray: 5 5; opacity: 0.3; }
        @keyframes dash-flow { to { stroke-dashoffset: -15; } }
        .camera-layer { transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); will-change: transform; }
        .infinite-bg { background-image: radial-gradient(#334155 1px, transparent 1px); background-size: 30px 30px; }
    </style>
    <script src="settings_manager.js"></script>
    <script src="algorithm_data.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        const IconWrapper = ({ children, size = 20, className="", ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>{children}</svg>
        );
        const Play = (props) => <IconWrapper {...props}><polygon points="5 3 19 12 5 21 5 3"></polygon></IconWrapper>;
        const Pause = (props) => <IconWrapper {...props}><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></IconWrapper>;
        const SkipBack = (props) => <IconWrapper {...props}><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5"></line></IconWrapper>;
        const SkipForward = (props) => <IconWrapper {...props}><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></IconWrapper>;
        const Rewind = (props) => <IconWrapper {...props}><polygon points="11 19 2 12 11 5 11 19"></polygon><polygon points="22 19 13 12 22 5 22 19"></polygon></IconWrapper>;
        const FastForward = (props) => <IconWrapper {...props}><polygon points="13 19 22 12 13 5 13 19"></polygon><polygon points="2 19 11 12 2 5 2 19"></polygon></IconWrapper>;
        const GripHorizontal = (props) => <IconWrapper {...props}><circle cx="12" cy="9" r="1"></circle><circle cx="19" cy="9" r="1"></circle><circle cx="5" cy="9" r="1"></circle><circle cx="12" cy="15" r="1"></circle><circle cx="19" cy="15" r="1"></circle><circle cx="5" cy="15" r="1"></circle></IconWrapper>;
        const Home = (props) => <IconWrapper {...props}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></IconWrapper>;
        const Volume2 = (props) => <IconWrapper {...props}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></IconWrapper>;
        const VolumeX = (props) => <IconWrapper {...props}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></IconWrapper>;
        const ChevronUp = (props) => <IconWrapper {...props}><polyline points="18 15 12 9 6 15"></polyline></IconWrapper>;
        const ChevronDown = (props) => <IconWrapper {...props}><polyline points="6 9 12 15 18 9"></polyline></IconWrapper>;
        const Edit = (props) => <IconWrapper {...props}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></IconWrapper>;

        const DEFAULT_EDGES = `A B 2
A C 3
B C 1
B D 1
C E 5
D E 1
E F 2
D F 4`;

        const GROUP_COLORS = [
            'border-slate-700', 'border-blue-500', 'border-emerald-500', 'border-rose-500', 
            'border-amber-500', 'border-purple-500', 'border-cyan-500', 'border-indigo-500'
        ];

        const BG_COLORS = [
            'bg-slate-700/20', 'bg-blue-500/20', 'bg-emerald-500/20', 'bg-rose-500/20', 
            'bg-amber-500/20', 'bg-purple-500/20', 'bg-cyan-500/20', 'bg-indigo-500/20'
        ];

        const TEXT_COLORS = [
            'text-slate-400', 'text-blue-400', 'text-emerald-400', 'text-rose-400', 
            'text-amber-400', 'text-purple-400', 'text-cyan-400', 'text-indigo-400'
        ];

        function parseGraph(text) {
            const lines = text.trim().split('\n');
            const edges = [];
            const nodeIds = new Set();
            lines.forEach(line => {
                const parts = line.trim().split(/\s+/);
                if (parts.length === 3) {
                    const [u, v, w] = parts;
                    if (u && v && !isNaN(Number(w))) {
                        edges.push({ from: u, to: v, weight: Number(w) });
                        nodeIds.add(u); nodeIds.add(v);
                    }
                }
            });
            const nodesArr = Array.from(nodeIds).sort();
            const nodes = nodesArr.map((id, i) => {
                const angle = (i / nodesArr.length) * 2 * Math.PI;
                return { id, x: 500 + 250 * Math.cos(angle), y: 500 + 250 * Math.sin(angle) };
            });
            return { nodes, edges };
        }

        class UnionFind {
            constructor(elements) {
                this.parent = {};
                this.rank = {};
                elements.forEach(e => {
                    this.parent[e] = e;
                    this.rank[e] = 0;
                });
            }
            find(i) {
                if (this.parent[i] === i) return i;
                this.parent[i] = this.find(this.parent[i]);
                return this.parent[i];
            }
            union(i, j) {
                const rootI = this.find(i);
                const rootJ = this.find(j);
                if (rootI != rootJ) {
                    if (this.rank[rootI] < this.rank[rootJ]) this.parent[rootI] = rootJ;
                    else if (this.rank[rootI] > this.rank[rootJ]) this.parent[rootJ] = rootI;
                    else {
                        this.parent[rootI] = rootJ;
                        this.rank[rootJ]++;
                    }
                    return true;
                }
                return false;
            }
            getGroups(elements) {
                const groups = {};
                elements.forEach(id => {
                    const root = this.find(id);
                    if (!groups[root]) groups[root] = [];
                    groups[root].push(id);
                });
                return groups;
            }
        }

        function generateSimulation(graph) {
            const history = [];
            const mstEdges = [];
            const rejectedEdges = [];
            const nodeIds = graph.nodes.map(n => n.id);
            if (nodeIds.length === 0) return [];

            const uf = new UnionFind(nodeIds);
            const sortedEdges = [...graph.edges].sort((a, b) => a.weight - b.weight);
            
            history.push({ 
                stepId: 0, 
                groups: uf.getGroups(nodeIds), 
                mstEdges: [], 
                rejectedEdges: [], 
                sortedEdges,
                status: 'START', 
                desc: "Sorted all edges by weight", 
                speech: KRUSKALS_SCRIPT.START() 
            });

            for (const edge of sortedEdges) {
                history.push({ 
                    stepId: history.length, 
                    activeEdge: edge, 
                    groups: uf.getGroups(nodeIds), 
                    mstEdges: [...mstEdges], 
                    rejectedEdges: [...rejectedEdges], 
                    sortedEdges,
                    status: 'CHECKING', 
                    desc: `Checking ${edge.from}-${edge.to} (${edge.weight})`, 
                    speech: KRUSKALS_SCRIPT.CHECKING(edge.from, edge.to, edge.weight) 
                });

                const rootU = uf.find(edge.from);
                const rootV = uf.find(edge.to);

                if (rootU !== rootV) {
                    uf.union(edge.from, edge.to);
                    mstEdges.push(edge);
                    history.push({ 
                        stepId: history.length, 
                        activeEdge: edge, 
                        groups: uf.getGroups(nodeIds), 
                        mstEdges: [...mstEdges], 
                        rejectedEdges: [...rejectedEdges], 
                        sortedEdges,
                        status: 'ADDING', 
                        desc: `Connected ${edge.from} and ${edge.to}`, 
                        speech: KRUSKALS_SCRIPT.ADDING(edge.from, edge.to) 
                    });
                } else {
                    rejectedEdges.push(edge);
                    history.push({ 
                        stepId: history.length, 
                        activeEdge: edge, 
                        groups: uf.getGroups(nodeIds), 
                        mstEdges: [...mstEdges], 
                        rejectedEdges: [...rejectedEdges], 
                        sortedEdges,
                        status: 'REJECTING', 
                        desc: `Cycle detected! Skipping...`, 
                        speech: KRUSKALS_SCRIPT.SKIPPING(edge.from, edge.to) 
                    });
                }
            }

            const total = mstEdges.reduce((sum, e) => sum + e.weight, 0);
            history.push({ 
                stepId: history.length, 
                sortedEdges, 
                status: 'SUCCESS', 
                groups: uf.getGroups(nodeIds), 
                mstEdges: [...mstEdges], 
                rejectedEdges: [...rejectedEdges], 
                desc: `MST Complete (Cost: ${total})`, 
                speech: KRUSKALS_SCRIPT.SUCCESS(total) 
            });
            return history;
        }

        const NodeComponent = ({ node, groupId, isActive }) => {
            const [settings, setSettings] = useState(JSON.parse(localStorage.getItem('simulation_settings') || '{"fontSize": 16, "nodeColor": "#3b82f6"}'));
            useEffect(() => {
                const handleUpdate = () => setSettings(JSON.parse(localStorage.getItem('simulation_settings') || '{"fontSize": 16, "nodeColor": "#3b82f6"}'));
                window.addEventListener('simulation_settings_updated', handleUpdate);
                return () => window.removeEventListener('simulation_settings_updated', handleUpdate);
            }, []);

            return (
                <div 
                    className={`absolute w-16 h-16 rounded-full bg-slate-800 border-4 flex flex-col items-center justify-center transition-all duration-500 z-20 ${GROUP_COLORS[groupId % GROUP_COLORS.length]} ${isActive ? 'scale-110 shadow-xl' : ''}`} 
                    style={{ 
                        left: node.x - 32, 
                        top: node.y - 32, 
                        fontSize: settings.fontSize + "px",
                        boxShadow: isActive ? `0 0 20px ${settings.nodeColor}` : undefined
                    }}
                >
                    <span className="text-xl font-black text-white">{node.id}</span>
                </div>
            );
        };

        const EdgeComponent = ({ edge, nodes, stage, settings }) => {
            const u = nodes.find(n => n.id === edge.from);
            const v = nodes.find(n => n.id === edge.to);
            if(!u || !v) return null;
            
            let color = "#1e293b";
            let width = 2;
            let className = "";
            let opacity = 1;

            if (stage === 'mst') { color = "#10b981"; width = 6; className = "edge-mst"; }
            else if (stage === 'rejected') { color = "#ef4444"; opacity = 0.3; className = "edge-rejected"; }
            else if (stage === 'active') { color = "#6366f1"; width = 4; className = "edge-active"; }

            return (
                <g style={{ opacity }}>
                    <line x1={u.x} y1={u.y} x2={v.x} y2={v.y} stroke={color} strokeWidth={width} className={className} style={{ transition: 'all 0.5s' }} />
                    <circle cx={(u.x+v.x)/2} cy={(u.y+v.y)/2} r="12" fill="#0f172a" />
                    <text x={(u.x+v.x)/2} y={(u.y+v.y)/2} textAnchor="middle" dy=".3em" fontSize={settings.fontSize} fontWeight="bold" fill={stage === 'mst' ? "#10b981" : "#94a3b8"}>{edge.weight}</text>
                </g>
            );
        };

        const EdgeTable = ({ edges, activeEdge, mstEdges, rejectedEdges }) => (
            <div className="bg-slate-800/50 rounded-xl overflow-hidden border border-slate-700">
                <table className="w-full text-left text-xs">
                    <thead className="sticky top-0 z-10">
                        <tr className="bg-slate-900/80 text-slate-400 uppercase tracking-wider font-bold">
                            <th className="px-3 py-2">Edge</th>
                            <th className="px-3 py-2 text-right">Weight</th>
                            <th className="px-3 py-2 text-center">Status</th>
                        </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-700/50">
                        {edges.map((edge, i) => {
                            const isActive = activeEdge === edge;
                            const isMst = mstEdges.includes(edge);
                            const isRejected = rejectedEdges.includes(edge);
                            let statusText = "Pending";
                            let statusClass = "text-slate-500";
                            if (isMst) { statusText = "Added"; statusClass = "text-emerald-400"; }
                            else if (isRejected) { statusText = "Rejected"; statusClass = "text-rose-400"; }
                            else if (isActive) { statusText = "Checking"; statusClass = "text-indigo-400 font-bold animate-pulse"; }

                            return (
                                <tr key={i} className={`transition-colors ${isActive ? 'bg-indigo-500/20' : isMst ? 'bg-emerald-500/5' : ''}`}>
                                    <td className="px-3 py-2 font-mono font-bold">{edge.from} — {edge.to}</td>
                                    <td className="px-3 py-2 text-right font-bold text-slate-300">{edge.weight}</td>
                                    <td className={`px-3 py-2 text-center text-[10px] uppercase font-black ${statusClass}`}>{statusText}</td>
                                </tr>
                            );
                        })}
                    </tbody>
                </table>
            </div>
        );

        const GroupTable = ({ groups }) => {
            const groupRoots = Object.keys(groups).sort();
            return (
                <div className="flex flex-col gap-2">
                    {groupRoots.map((root, i) => {
                        const groupId = i + 1;
                        return (
                            <div key={root} className={`p-3 rounded-xl border-2 transition-all duration-500 ${GROUP_COLORS[groupId % GROUP_COLORS.length]} ${BG_COLORS[groupId % BG_COLORS.length]}`}>
                                <div className="flex items-center justify-between mb-2">
                                    <span className={`text-[10px] font-black uppercase tracking-widest ${TEXT_COLORS[groupId % TEXT_COLORS.length]}`}>Set {groupId}</span>
                                    <span className="text-[9px] text-slate-500 font-mono">Root: {root}</span>
                                </div>
                                <div className="flex flex-wrap gap-1.5">
                                    {groups[root].sort().map(nodeId => (
                                        <div key={nodeId} className="w-7 h-7 rounded-lg bg-slate-900 flex items-center justify-center text-[11px] font-bold text-white border border-white/10 shadow-inner">
                                            {nodeId}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        };

        const App = () => {
            const { SettingsIcon, SettingsModal } = useMemo(() => window.initSettingsComponents(React), []);
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [settings, setSettings] = useState(JSON.parse(localStorage.getItem('simulation_settings') || '{"fontSize": 12, "nodeColor": "#3b82f6"}'));
            
            useEffect(() => {
                const handleUpdate = () => setSettings(JSON.parse(localStorage.getItem('simulation_settings') || '{"fontSize": 12, "nodeColor": "#3b82f6"}'));
                window.addEventListener('simulation_settings_updated', handleUpdate);
                return () => window.removeEventListener('simulation_settings_updated', handleUpdate);
            }, []);

            const [inputText, setInputText] = useState(DEFAULT_EDGES);
            const [isEditing, setIsEditing] = useState(false);
            const [currentStep, setCurrentStep] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [speedMultiplier, setSpeedMultiplier] = useState(1);
            const [zoom, setZoom] = useState(0.85);
            const [isMuted, setIsMuted] = useState(false);
            const [isMinimized, setIsMinimized] = useState(false);
            const [showSidebar, setShowSidebar] = useState(true);
            
            const [manualOffset, setManualOffset] = useState({ x: window.innerWidth / 2 - 400, y: window.innerHeight / 2 - 400 });
            const [panelOffset, setPanelOffset] = useState({ x: 0, y: 0 });
            const [isDraggingCanvas, setIsDraggingCanvas] = useState(false);
            const [isDraggingPanel, setIsDraggingPanel] = useState(false);
            const canvasDragStart = useRef({ x: 0, y: 0 });
            const panelDragStart = useRef({ x: 0, y: 0 });
            const isPlayingRef = useRef(false);
            isPlayingRef.current = isPlaying;

            const graph = useMemo(() => parseGraph(inputText), [inputText]);
            const history = useMemo(() => generateSimulation(graph), [graph]);

            const nextStep = () => { 
                setCurrentStep(prev => {
                    if (prev < history.length - 1) return prev + 1;
                    setIsPlaying(false);
                    return prev;
                }); 
            };
            const prevStep = () => { setCurrentStep(prev => Math.max(0, prev - 1)); setIsPlaying(false); };

            const speak = (text) => {
                const delay = (1000 / speedMultiplier);
                if (isMuted || !text) { 
                    setTimeout(() => { if(isPlayingRef.current) nextStep(); }, delay); 
                    return; 
                }
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                const voices = window.speechSynthesis.getVoices();
                if(voices.length > 0) utterance.voice = voices.find(v => v.lang.includes('en-US')) || voices[0];
                utterance.pitch = 1.0; 
                utterance.rate = 1.0 * speedMultiplier;
                utterance.onend = () => { if(isPlayingRef.current) nextStep(); };
                window.speechSynthesis.speak(utterance);
            };

            useEffect(() => {
                if (isPlaying) speak(history[currentStep]?.speech);
                else window.speechSynthesis.cancel();
            }, [isPlaying, currentStep]);

            const state = history[currentStep] || { groups: {}, mstEdges: [], rejectedEdges: [], sortedEdges: [] };

            const getNodeGroupId = (nodeId) => {
                if (!state.groups) return 0;
                const roots = Object.keys(state.groups).sort();
                const index = roots.findIndex(root => state.groups[root].includes(nodeId));
                return index + 1;
            };

            return (
                <div className="h-screen w-screen flex flex-col relative overflow-hidden bg-[#0f172a] text-white select-none" 
                    onMouseMove={(e) => { 
                        if(isDraggingPanel) setPanelOffset({x: e.clientX-panelDragStart.current.x, y: e.clientY-panelDragStart.current.y}); 
                        else if(isDraggingCanvas) setManualOffset({x: e.clientX-canvasDragStart.current.x, y: e.clientY-canvasDragStart.current.y}); 
                    }} 
                    onMouseUp={() => {setIsDraggingCanvas(false); setIsDraggingPanel(false);}}
                >
                    <div className="absolute top-0 left-0 right-0 z-[60] top-nav-area">
                        <div className="absolute top-0 left-0 w-full h-4 z-[70] peer"></div>
                        <div className="relative h-16 bg-slate-900/80 backdrop-blur-md border-b border-slate-700/50 flex items-center justify-between px-6 shadow-2xl transition-transform duration-300 -translate-y-full peer-hover:translate-y-0 hover:translate-y-0 z-[60]">
                            <div className="flex items-center gap-4">
                                <a href="index.html" className="bg-slate-800 p-2 rounded-lg hover:bg-slate-700 transition-colors text-slate-400 hover:text-white">
                                    <Home size={20} />
                                </a>
                                <div>
                                    <h1 className="font-bold text-lg leading-none tracking-tight">Kruskal's Algorithm</h1>
                                    <span className="text-xs text-slate-400 font-mono">Edge-Based Minimum Spanning Tree</span>
                                    <button onClick={() => setIsSettingsOpen(true)} className="ml-4 p-2 bg-slate-800 hover:bg-slate-700 rounded-lg transition-colors text-slate-400 hover:text-white shadow-lg">
                                        <SettingsIcon size={20}/>
                                    </button>
                                </div>
                            </div>
                            <div className="flex items-center gap-3">
                                <button onClick={() => setShowSidebar(!showSidebar)} className={`flex items-center gap-2 px-4 py-2 rounded-lg font-bold transition-all ${showSidebar ? 'bg-slate-700 text-white' : 'bg-slate-800 text-slate-400 hover:text-white'}`}>
                                    {showSidebar ? "Hide Sidebar" : "Show Sidebar"}
                                </button>
                                <button onClick={() => setIsEditing(true)} className="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-lg font-bold transition-all shadow-lg shadow-indigo-900/20">
                                    <Edit size={18}/> Edit Graph
                                </button>
                            </div>
                        </div>
                    </div>

                    {isEditing && (
                        <div className="absolute inset-0 z-[100] bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-6 text-white pointer-events-auto">
                            <div className="bg-slate-900 border border-slate-700 rounded-3xl p-8 max-w-lg w-full shadow-2xl">
                                <h2 className="text-2xl font-bold mb-2">Edit Graph Edges</h2>
                                <p className="text-slate-400 text-sm mb-4">Format: <code className="bg-slate-800 px-1.5 py-0.5 rounded text-indigo-300">Node1 Node2 Weight</code></p>
                                <textarea value={inputText} onChange={(e) => setInputText(e.target.value)} className="w-full h-64 bg-slate-950 border border-slate-700 rounded-xl p-4 font-mono text-indigo-400 outline-none focus:border-indigo-500 mb-6" />
                                <div className="flex justify-end gap-4">
                                    <button onClick={() => setIsEditing(false)} className="px-6 py-2 rounded-xl font-bold text-slate-400 hover:bg-slate-800 transition-all">Cancel</button>
                                    <button onClick={() => { setIsEditing(false); setCurrentStep(0); setIsPlaying(false); }} className="px-8 py-2 rounded-xl font-bold bg-indigo-600 hover:bg-indigo-500 shadow-lg shadow-indigo-900/40 transition-all text-white">Apply Graph</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <SettingsModal isOpen={isSettingsOpen} onClose={() => setIsSettingsOpen(false)} />
                    <AlgorithmPanel algoKey="KRUSKAL" currentLine={state.algoLine} />

                    <div className="flex flex-1 overflow-hidden relative">
                        <div className="flex-1 relative infinite-bg overflow-hidden cursor-grab active:cursor-grabbing" 
                            onWheel={(e) => setZoom(z => Math.min(Math.max(0.2, z-e.deltaY*0.001), 2.0))} 
                            onMouseDown={(e) => {
                                if(!e.target.closest('.control-panel-wrapper') && !e.target.closest('.top-nav-area')) {
                                    setIsDraggingCanvas(true); 
                                    canvasDragStart.current={x: e.clientX-manualOffset.x, y: e.clientY-manualOffset.y};
                                }
                            }}
                        >
                            <div className={`node-container absolute origin-top-left ${isDraggingCanvas ? '' : 'camera-layer'}`} 
                                style={{ transform: `translate(${manualOffset.x}px, ${manualOffset.y}px) scale(${zoom})` }}>
                                <svg className="absolute top-0 left-0 overflow-visible" style={{ width: 1000, height: 1000 }}>
                                    {graph.edges.map((edge, i) => {
                                        let stage = 'pending';
                                        if (state.mstEdges.includes(edge)) stage = 'mst';
                                        else if (state.rejectedEdges.includes(edge)) stage = 'rejected';
                                        else if (state.activeEdge === edge) stage = 'active';
                                        return <EdgeComponent key={i} edge={edge} nodes={graph.nodes} stage={stage} settings={settings} />;
                                    })}
                                </svg>
                                {graph.nodes.map(node => (
                                    <NodeComponent 
                                        key={node.id} 
                                        node={node} 
                                        groupId={getNodeGroupId(node.id)} 
                                        isActive={state.activeEdge?.from === node.id || state.activeEdge?.to === node.id}
                                    />
                                ))}
                            </div>
                        </div>

                        {showSidebar && (
                            <div className="w-80 bg-slate-900/50 backdrop-blur-xl border-l border-slate-700/50 flex flex-col p-6 overflow-y-auto gap-6 z-40 relative shadow-2xl">
                                <div>
                                    <h3 className="text-xs font-black uppercase tracking-[0.2em] text-indigo-400 mb-4 flex items-center gap-2">
                                        <div className="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></div> Sorted Edges
                                    </h3>
                                    <EdgeTable edges={state.sortedEdges} activeEdge={state.activeEdge} mstEdges={state.mstEdges} rejectedEdges={state.rejectedEdges} />
                                </div>
                                <div>
                                    <h3 className="text-xs font-black uppercase tracking-[0.2em] text-emerald-400 mb-4 flex items-center gap-2">
                                        <div className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div> Disjoint Sets
                                    </h3>
                                    <GroupTable groups={state.groups} />
                                </div>
                            </div>
                        )}
                    </div>

                    <div className="absolute bottom-6 left-1/2 w-full max-w-4xl px-4 z-50 control-panel-wrapper" 
                        style={{ transform: `translate(calc(-50% + ${panelOffset.x}px), ${panelOffset.y}px)` }}>
                        <div className={`bg-slate-900/40 hover:bg-slate-900/85 backdrop-blur-md border border-slate-600/30 rounded-2xl shadow-2xl flex flex-col relative box-border transition-all duration-300 ${isMinimized ? 'w-fit min-w-[180px] mx-auto px-4 pb-3 pt-1' : 'px-5 pb-4 pt-2'}`}>
                            <div className="w-full h-6 cursor-grab active:cursor-grabbing flex justify-center items-center mb-1" 
                                onMouseDown={(e) => {
                                    e.preventDefault(); 
                                    setIsDraggingPanel(true); 
                                    panelDragStart.current={x:e.clientX-panelOffset.x, y:e.clientY-panelOffset.y}; 
                                    e.stopPropagation();
                                }}
                            >
                                <div className="bg-white/10 rounded-full px-6 py-0.5"><GripHorizontal size={12} className="text-white/50" /></div>
                            </div>
                            <button onClick={() => setIsMinimized(!isMinimized)} className="absolute top-2 right-2 p-1 hover:bg-slate-700/50 rounded-md text-slate-400 hover:text-white transition-colors z-50">
                                {isMinimized ? <ChevronUp size={16}/> : <ChevronDown size={18}/>}
                            </button>
                            {isMinimized ? (
                                <div className="flex items-center justify-center gap-4">
                                    <button onClick={prevStep} className="p-1.5 hover:bg-slate-700/50 rounded-md text-slate-200"><Rewind size={18}/></button>
                                    <button onClick={() => setIsPlaying(!isPlaying)} 
                                        className={`w-10 h-10 flex items-center justify-center rounded-full shadow-lg transform transition-all active:scale-95 border border-white/20 ${isPlaying ? 'bg-amber-500' : 'bg-blue-600'}`}>
                                        {isPlaying ? <Pause fill="white" size={18} /> : <Play fill="white" size={18} className="ml-1"/>}
                                    </button>
                                    <button onClick={nextStep} className="p-1.5 hover:bg-slate-700/50 rounded-md text-slate-200"><FastForward size={18}/></button>
                                </div>
                            ) : (
                                <>
                                    <div className="relative w-full h-1.5 bg-slate-800/80 rounded-full mb-3 mt-1">
                                        <div className="absolute top-0 left-0 h-full bg-blue-500 rounded-full transition-all duration-100" style={{ width: `${(currentStep / (history.length-1)) * 100}%` }}></div>
                                        <input type="range" min="0" max={history.length - 1} value={currentStep} onChange={(e) => { setIsPlaying(false); setCurrentStep(Number(e.target.value)); }} className="absolute -top-2 left-0 w-full h-6 opacity-0 cursor-pointer z-10" />
                                    </div>
                                    <div className="flex items-center justify-between w-full">
                                        <div className="flex flex-col w-[30%] overflow-hidden pr-2">
                                            <span className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-0.5">Step {String(currentStep).padStart(3, '0')}</span>
                                            <span className="text-sm font-mono text-emerald-300 truncate">{state?.desc}</span>
                                        </div>
                                        <div className="flex items-center justify-center gap-3 w-[40%]">
                                            <button onClick={() => setCurrentStep(0)} className="p-1.5 hover:bg-slate-700/50 rounded-md text-slate-300 transition-colors"><SkipBack size={16}/></button>
                                            <button onClick={prevStep} className="p-1.5 hover:bg-slate-700/50 rounded-md text-slate-200 transition-colors"><Rewind size={18}/></button>
                                            <button onClick={() => setIsPlaying(!isPlaying)} 
                                                className={`w-12 h-12 flex items-center justify-center rounded-full shadow-lg transform transition-all active:scale-95 border border-white/20 ${isPlaying ? 'bg-amber-500' : 'bg-blue-600'}`}>
                                                {isPlaying ? <Pause fill="white" size={20} /> : <Play fill="white" size={20} className="ml-1"/>}
                                            </button>
                                            <button onClick={nextStep} className="p-1.5 hover:bg-slate-700/50 rounded-md text-slate-200 transition-colors"><FastForward size={18}/></button>
                                            <button onClick={() => setCurrentStep(history.length - 1)} className="p-1.5 hover:bg-slate-700/50 rounded-md text-slate-300 transition-colors"><SkipForward size={16}/></button>
                                        </div>
                                        <div className="flex items-center justify-end gap-4 w-[30%]">
                                            <button onClick={() => setIsMuted(!isMuted)} className={`p-2 rounded-lg transition-colors ${isMuted ? 'text-rose-400 bg-rose-400/10' : 'text-blue-400 bg-blue-400/10'}`}>
                                                {isMuted ? <VolumeX size={18}/> : <Volume2 size={18}/>}
                                            </button>
                                            <div className="flex flex-col gap-1 items-end w-24">
                                                <span className="text-[9px] font-bold uppercase text-slate-400 tracking-wider">Speed {speedMultiplier}x</span>
                                                <input type="range" min="0.5" max="3.0" step="0.1" value={speedMultiplier} onChange={(e) => setSpeedMultiplier(Number(e.target.value))} className="w-full h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-blue-400" />
                                            </div>
                                        </div>
                                    </div>
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
