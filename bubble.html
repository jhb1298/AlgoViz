<head>
    <meta charset="UTF-8">

    <meta name="description" content="Explore the mathematical beauty of Bubble Sort Visualizer through interactive, cinematic visualizations.">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://mastersuite.netlify.app/bubble.html">

    <link rel="stylesheet" href="/src/main.css">
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 2px; }
        .camera-layer { transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); will-change: transform; }
        .infinite-bg { background-image: radial-gradient(#334155 1px, transparent 1px); background-size: 30px 30px; }
        .bar-transition { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.3s; }
        .bubble-particle { position: absolute; pointer-events: none; background: rgba(255, 255, 255, 0.4); border: 1px solid rgba(255, 255, 255, 0.6); border-radius: 50%; animation: rise-and-fade 1s ease-out forwards; }
        @keyframes rise-and-fade {
            0% { transform: translateY(0) scale(0.5); opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="./bubble.jsx"></script>
</body>
</html>
